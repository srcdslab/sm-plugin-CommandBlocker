project:
  sourceknight: 0.3
  name: CommandBlocker

  dependencies:
    - name: sourcemod
      type: tar
      version: 1.12
      location: https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git7223-linux.tar.gz
      unpack:
        - source: /addons
          dest: /addons

    - name: basic
      type: git
      repo: https://github.com/srcdslab/sm-plugin-basic
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

  root: /
  output: /addons/sourcemod/plugins

  targets:
    - CommandBlocker
